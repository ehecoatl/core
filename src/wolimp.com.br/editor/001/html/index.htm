			window.onerror = (message, source, lineno, colno, error) => {
				window.dispatchEvent(new CustomEvent('wolimp-toast', { detail: { message: message }, bubbles:!1 }));

				if(!iframe) return;
				const doc = (iframe.contentDocument || iframe.contentWindow.document || null);
				doc.documentElement.pauseAnimations(); doc.documentElement.style = `--bs-link:red;--bs-primary:red;background-color:transparent;`;

		<div id="splash-loader" class="app-screen" style="z-index:2;background:none!important;display: flex; flex-flow:column; justify-content: center; align-items: center;">
			<iframe id="splash-loader-svg" allowtransparency="true" frameborder="0" width="100px" height="100px" style="color: var(--bs-loader-bg);width:100pt; aspect-ratio: 1; opacity: 0.01;transition: opacity 0.25s linear, transform 1s linear, color 0.5s linear;will-change: transform, opacity, color; border:0;background: transparent;color-scheme: auto;" uuid-src="/assets/img/svg-loading-primary.svg?uuid={{uuid_img}}" uuid-attr="src" onload="
				this.style.opacity=1;
				const doc = (this.contentDocument || this.contentWindow.document);
				requestAnimationFrame(()=>{
					const style = window.getComputedStyle(document.body);
					doc.documentElement.style = `--bs-link:${style.getPropertyValue('--link-color')};--bs-primary:${style.getPropertyValue('--bs-primary')};background-color:transparent;`;
				});
				promise_value(window,'DOM_LOADED').then(()=>{
					document.getElementById('progress-bar-bg').style.opacity=1;
				});
				"></iframe>
			<script>
			document.querySelectorAll('[uuid-attr]').forEach((c)=>{
			    const a = c.getAttribute('uuid-attr');
			    const b = c.getAttribute('uuid-'+a);
			    c.setAttribute(a, b.cacheUUID());
			});
			</script>
