<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Ehecoatl Hello World</title>
</head>
<body>
  <h1>Hello World</h1>
  <p>Ehecoatl minimal tenant asset route is working.</p>
  <h2>POST Example</h2>
  <p>This form submits URL-encoded data to <code>/post-data</code>.</p>
  <form method="post" action="/post-data">
    <label>
      Name
      <input type="text" name="name" value="Ada Lovelace">
    </label>
    <br>
    <label>
      Message
      <input type="text" name="message" value="Hello from the template">
    </label>
    <br>
    <button type="submit">Send POST Request</button>
  </form>
</body>
</html>
